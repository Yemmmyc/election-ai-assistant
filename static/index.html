<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaijaVote AI | Election Assistant</title>
    <meta name="description" content="Your intelligent guide to Nigerian elections. Ask about voter registration, polling units, and civic duties.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Ambient Background Glow -->
        <div class="ambient-glow"></div>
        <div class="ambient-glow glow-2"></div>

        <div class="chat-interface">
            <header class="header">
                <div class="header-content">
                    <div class="logo">
                        <div class="logo-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00b86a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M2 17L12 22L22 17" stroke="#00b86a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M2 12L12 17L22 12" stroke="#00b86a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <h1>NaijaVote AI</h1>
                    </div>
                    <p class="subtitle">Your intelligent guide to Nigerian elections</p>
                </div>
            </header>

            <main class="chat-area" id="chat-area">
                <div class="message bot-message intro-animation">
                    <div class="avatar">
                        <div class="avatar-inner">AI</div>
                    </div>
                    <div class="message-bubble glass-panel">
                        <p>Welcome! I'm your Nigerian Election Assistant. You can ask me about voter registration, polling units, election dates, or civic duties. How can I help you today?</p>
                    </div>
                </div>
            </main>

            <footer class="input-area glass-panel">
                <form id="chat-form" class="input-form">
                    <input type="text" id="user-input" placeholder="Ask about voting in Nigeria..." autocomplete="off" required>
                    <button type="submit" id="send-button" class="send-btn" aria-label="Send message">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
            </footer>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
